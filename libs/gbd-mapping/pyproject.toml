[tool.black]
line_length = 94
exclude = '''
/(
   build
   | src/gbd_mapping
)/

'''

[tool.isort]
profile = "black"

[tool.setuptools_scm]
write_to = "src/gbd_mapping/_version.py"
write_to_template = '__version__ = "{version}"\n'
version_scheme = "python-simplified-semver"
local_scheme = "no-local-version"
tag_regex = "^vivarium-gbd-mapping-v(?P<version>[^\\+]+)(?P<suffix>.*)?$"
search_parent_directories = true
git_describe_command = "git describe --dirty --tags --long --match 'vivarium-gbd-mapping-v*'"

[tool.pytest.ini_options]
testpaths = ["tests/"]

[tool.coverage.run]
source = ["gbd_mapping"]

[tool.coverage.report]
show_missing = true
